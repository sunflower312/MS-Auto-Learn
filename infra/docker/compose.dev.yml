name: autolearn

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autolearn
      POSTGRES_USER: autolearn
      POSTGRES_PASSWORD: autolearn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autolearn -d autolearn"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: ${AUTOLEARN_API_IMAGE:-autolearn/api:latest}
    restart: "no"
    command: ["pnpm", "--filter", "@autolearn/api", "exec", "tsx", "dist/src/cli/migrate.js"]
    environment:
      DATABASE_URL: postgres://autolearn:autolearn@postgres:5432/autolearn
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      cache_from:
        - type=local,src=/data/buildx-cache/api
      cache_to:
        - type=local,dest=/data/buildx-cache/api,mode=max
    image: ${AUTOLEARN_API_IMAGE:-autolearn/api:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://autolearn:autolearn@postgres:5432/autolearn
      SESSION_SECRET: ${SESSION_SECRET:-01234567890123456789012345678901}
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      cache_from:
        - type=local,src=/data/buildx-cache/web
      cache_to:
        - type=local,dest=/data/buildx-cache/web,mode=max
    image: ${AUTOLEARN_WEB_IMAGE:-autolearn/web:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres-data:
